{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">

    <header class="mb-12">
        <a href="/" class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold hover:text-white transition-colors mb-4 inline-block">&larr; Return to Roster</a>
        <h1 class="text-5xl font-black uppercase tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-500">
            {{ name }}
        </h1>
    </header>

    <div class="bg-zinc-950/50 border border-zinc-900 rounded-[2.5rem] p-8 flex flex-col mb-20 shadow-2xl relative overflow-hidden">

        <div class="absolute -inset-2 bg-purple-500/5 blur-3xl -z-10 pointer-events-none"></div>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 px-2">
            <div>
                <h3 class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 italic">Broadcast Uplink // Live & Archive</h3>
            </div>

            <div class="flex flex-wrap items-center gap-4">
                <a href="https://twitter.com/{{ twitter_handle }}" target="_blank" rel="noopener noreferrer"
                   class="flex items-center gap-2 px-4 py-2 bg-black border border-zinc-800 hover:border-zinc-500 rounded-full transition-all group z-10">
                    <svg viewBox="0 0 24 24" class="w-3 h-3 fill-zinc-500 group-hover:fill-white transition-colors" aria-hidden="true">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span class="text-[9px] font-mono text-zinc-500 group-hover:text-white uppercase tracking-widest transition-colors">@{{ twitter_handle }}</span>
                </a>

                <div class="flex items-center gap-2 px-3 py-2 bg-purple-900/10 border border-purple-500/20 rounded-full">
                    <span class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-pulse shadow-[0_0_8px_#a855f7]"></span>
                    <span class="text-[9px] text-purple-400 font-mono tracking-widest uppercase font-bold">Player Ready</span>
                </div>
            </div>
        </div>

        <div class="w-full aspect-video rounded-2xl overflow-hidden border border-zinc-800 bg-black relative shadow-2xl z-10">
            <iframe
                src="https://player.twitch.tv/?channel={{ name }}&parent=localhost&parent=127.0.0.1&parent=oscsstats.com&parent=www.oscsstats.com"
                class="absolute inset-0 w-full h-full"
                frameborder="0"
                scrolling="no"
                allowfullscreen="allowfullscreen">
            </iframe>
        </div>
    </div>
</div>
{% endblock %}
