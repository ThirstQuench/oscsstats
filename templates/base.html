<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCS STATS | On Some Chill Shit</title>

    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { color-scheme: dark; }
        body {
            background-color: #000000 !important;
            color: #f4f4f5;
            margin: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        h1, h2, h3, .neon-text {
            font-style: italic;
            display: inline-block;
            overflow: visible !important;
            border-right: 0.25em solid transparent;
            line-height: 1.1;
        }

        @keyframes shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-gradient {
            background-size: 300% 300%;
            animation: shift 8s ease infinite;
        }

        .oscs-card {
            background: linear-gradient(145deg, #0a0a0a, #111111);
            border: 1px solid #1a1a1a;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .oscs-card:hover {
            border-color: #222;
            transform: translateY(-4px);
            box-shadow: 0 0 40px -10px rgba(145, 70, 255, 0.15);
        }

        .neon-text {
            color: #9146FF;
            text-shadow: 0 0 15px rgba(145, 70, 255, 0.5);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9146FF; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; }
    </style>
</head>

<body class="selection:bg-purple-900/50 selection:text-white min-h-screen">

    <nav class="p-6 border-b border-zinc-900 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-black tracking-tighter neon-text hover:opacity-80 transition-opacity uppercase italic">
                OSCS STATS
            </a>

            <div class="flex items-center space-x-6 text-[10px] uppercase tracking-[0.25em] text-zinc-500 font-bold">
                <a href="https://oscscentral.com" class="hover:text-purple-400 transition-colors italic">oscscentral</a>
                <span class="text-zinc-800">|</span>
                <div class="flex items-center">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-2 animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                    <span class="text-zinc-400 text-[9px]">Live Data</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:py-12">
        {% block content %}{% endblock %}
    </main>

    <footer class="p-10 border-t border-zinc-900 text-center">
        <p class="text-zinc-700 text-[10px] uppercase tracking-[0.5em] font-bold">
            On Some Chill Shit // Stats Engine
        </p>
    </footer>

</body>
</html>
